name: Build and Push Docker

on:
    push:
        branches: ["master"]
        paths:
            - "express/**"
            - "web/**"

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    express:
        runs-on: ubuntu-latest
        if: contains(github.event.head_commit.modified, 'express/') || github.event_name == 'workflow_dispatch'
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Server
              uses: docker/build-push-action@v5
              with:
                  context: ./express
                  push: true
                  tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/server:latest
    web:
        runs-on: ubuntu-latest
        if: contains(github.event.head_commit.modified, 'web/') || github.event_name == 'workflow_dispatch'
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Frontend
              uses: docker/build-push-action@v5
              with:
                  context: ./web
                  push: true
                  tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/web:latest
